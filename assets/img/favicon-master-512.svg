<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <title>Academic favicon - magnifier with bar chart</title>
  <rect x="24" y="24" width="464" height="464" rx="96" ry="96" fill="#0b1220"/>
  <!-- subtle highlight ring -->
  <circle cx="232" cy="232" r="132" fill="none" stroke="#0ea5e9" stroke-opacity="0.20" stroke-width="18"/>

  <!-- Magnifier (thick strokes for 16x16 legibility) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- lens outer -->
    <circle cx="232" cy="232" r="124" stroke="#ffffff" stroke-width="28"/>
    <!-- lens inner accent -->
    <circle cx="232" cy="232" r="96" stroke="#2563eb" stroke-width="16" opacity="0.95"/>

    <!-- handle -->
    <path d="M 320 320 L 408 408" stroke="#ffffff" stroke-width="34"/>
    <path d="M 320 320 L 408 408" stroke="#0ea5e9" stroke-width="16" opacity="0.95"/>
  </g>

  <!-- Bar chart inside lens -->
  <g>
    <!-- baseline -->
    <path d="M 172 286 L 292 286" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.95"/>
    <!-- bars: 3 thick bars with rounded caps -->
    <rect x="186" y="234" width="26" height="52" rx="10" fill="#2563eb"/>
    <rect x="228" y="206" width="26" height="80" rx="10" fill="#0ea5e9"/>
    <rect x="270" y="220" width="26" height="66" rx="10" fill="#ffffff"/>
  </g>
</svg>
